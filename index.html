<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安産祈願お守り</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hina+Mincho&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/normalize.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/script.js" defer></script>
</head>
<body>
    <div class="anzan">
        <section class="inner">
            <!-- <h1 class="anzan-headline">安産お守り</h1> -->
            <div class="anzan-scene">
                <div class="cloud-container egasumi-1">
                    <img src="assets/images/egasumi-1.png" alt="">

                <div class="cloud-container egasumi-2">
                    <img src="assets/images/egasumi-2.png" alt="">
                </div>
                <div class="cloud-container egasumi-3">
                    <img src="assets/images/egasumi-3.png" alt="">
                </div>
                <div class="cloud-container egasumi-4">
                    <img src="assets/images/egasumi-4.png" alt="">
                </div>
                <div class="cloud-container egasumi-5">
                    <img src="assets/images/egasumi-5.png" alt="">
                </div>
                <div class="anzan-result">
                    <img class="result" id="js-result" src="assets/images/omamori.png" alt="安産祈願">

            </div>
            <button type="button" class="anzan-button" id="js-button">安産祈願する</button>
